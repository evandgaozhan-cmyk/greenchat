<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenChat V7.0</title>

<style>
body {
  margin:0;
  font-family:Arial;
  height:100vh;
  display:flex;
  flex-direction:column;
}

/* TOP BAR */
#top {
  background:#075e54;
  color:white;
  display:flex;
  padding:8px;
  gap:10px;
  align-items:center;
}

#search {
  flex:1;
  padding:8px;
  border:none;
  border-radius:5px;
}

/* MAIN */
#main {
  flex:1;
  display:flex;
}

/* LEFT GROUP */
#left {
  width:20%;
  background:#128c7e;
  color:white;
  overflow-y:auto;
}

/* RIGHT DM */
#right {
  width:20%;
  background:#0b6b62;
  color:white;
  overflow-y:auto;
}

/* CENTER CHAT */
#mid {
  width:60%;
  display:flex;
  flex-direction:column;
  background:#e5ddd5;
}

/* HEADER CHAT */
#header {
  background:#075e54;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

/* CHAT BOX */
#chatBox {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* BUBBLE */
.bubble {
  max-width:70%;
  padding:10px;
  margin:5px;
  border-radius:10px;
}

.me { align-self:flex-end; background:#dcf8c6; }
.other { align-self:flex-start; background:white; }

.meta {
  font-size:10px;
  text-align:right;
}

/* INPUT */
#input {
  display:flex;
  padding:10px;
  background:white;
}

#input input {
  flex:1;
  padding:8px;
}

/* ITEM */
.item {
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
}

/* SETTINGS */
#settings {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#0008;
  display:none;
}

.box {
  background:white;
  margin:50px auto;
  padding:20px;
  width:90%;
}
</style>
</head>

<body>

<!-- TOP SEARCH -->
<div id="top">
<input id="search" placeholder="search user..." oninput="searchUser()">
<button onclick="openSettings()">⚙</button>
</div>

<!-- MAIN -->
<div id="main">

<!-- LEFT GROUP -->
<div id="left">
<h3>Groups</h3>
<div id="groupList"></div>
</div>

<!-- MID -->
<div id="mid">

<div id="header">
<div id="title">GreenChat V7</div>
</div>

<div id="chatBox"></div>

<div id="input">
<input id="msg" placeholder="message">
<button onclick="send()">➤</button>
</div>

</div>

<!-- RIGHT DM -->
<div id="right">
<h3>DM</h3>
<div id="dmList"></div>
</div>

</div>

<!-- SETTINGS -->
<div id="settings">
<div class="box">

<h3>Settings</h3>

<input id="img" placeholder="profile image URL"><br><br>

<label>
<input type="checkbox" id="privacy"> privacy mode
</label><br><br>

<button onclick="toggleTheme()">dark/light</button><br><br>
<button onclick="saveSettings()">save</button>
<button onclick="closeSettings()">close</button>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAnDdfNeNhS5oYYYNkESOZHCYbwe3boY2Q",
  authDomain: "morse-f36e5.firebaseapp.com",
  databaseURL: "https://morse-f36e5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "morse-f36e5",
  storageBucket: "morse-f36e5.firebasestorage.app",
  messagingSenderId: "41752377914",
  appId: "1:41752377914:web:881b1c19c011d6fea0d303",
  measurementId: "G-RLTTLG36SS"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* ===================== */
/* AUTO LOGIN SYSTEM     */
/* ===================== */

let user = localStorage.getItem("user");
let mode = "group";
let target = "main";
let privacy = false;

/* BOOT */
window.onload = function(){

 if(!user){
   user = prompt("Enter username:");
   localStorage.setItem("user",user);
 }

 db.ref("users/"+user).update({
   online:true,
   lastSeen:Date.now()
 });

 loadGroups();
 loadDM();
 openGroup("main");
};

/* OFFLINE TRACK */
window.onbeforeunload = ()=>{
 db.ref("users/"+user).update({
   online:false,
   lastSeen:Date.now()
 });
};

/* ===================== */
/* GROUP SYSTEM          */
/* ===================== */

function loadGroups(){
 let box=document.getElementById("groupList");
 box.innerHTML="";

 db.ref("groups").once("value",s=>{
   let d=s.val()||{main:true};

   Object.keys(d).forEach(g=>{
     let div=document.createElement("div");
     div.className="item";
     div.innerText="💬 "+g;
     div.onclick=()=>openGroup(g);
     box.appendChild(div);
   });
 });
}

function openGroup(g){
 mode="group";
 target=g;
 document.getElementById("title").innerText=g;
 loadChat();
}

/* ===================== */
/* DM SYSTEM             */
/* ===================== */

function loadDM(){
 let box=document.getElementById("dmList");
 box.innerHTML="";

 db.ref("users").once("value",s=>{
   let u=s.val()||{};

   Object.keys(u).forEach(n=>{
     if(n===user) return;

     let div=document.createElement("div");
     div.className="item";

     div.innerHTML="👤 "+n;
     div.onclick=()=>openDM(n);

     box.appendChild(div);
   });
 });
}

function openDM(n){
 mode="dm";
 target=n;
 document.getElementById("title").innerText="DM "+n;
 loadChat();
}

/* ===================== */
/* SEARCH USER           */
/* ===================== */

function searchUser(){
 let q=document.getElementById("search").value.toLowerCase();
 let items=document.querySelectorAll("#dmList .item");

 items.forEach(i=>{
   i.style.display=i.innerText.toLowerCase().includes(q)?"block":"none";
 });
}

/* ===================== */
/* CHAT ENGINE           */
/* ===================== */

function send(){
 let m=document.getElementById("msg").value;
 if(!m) return;

 let path =
 mode==="group"
 ? "groups/"+target+"/msg"
 : "dm/"+[user,target].sort().join("_")+"/msg";

 db.ref(path).push({
   name:user,
   msg:m,
   time:Date.now()
 });

 document.getElementById("msg").value="";
}

function loadChat(){
 let box=document.getElementById("chatBox");
 box.innerHTML="";

 let path =
 mode==="group"
 ? "groups/"+target+"/msg"
 : "dm/"+[user,target].sort().join("_")+"/msg";

 db.ref(path).off();

 db.ref(path).on("child_added",s=>{
   let d=s.val();

   let div=document.createElement("div");
   div.className="bubble "+(d.name===user?"me":"other");

   let time=new Date(d.time).toLocaleTimeString().slice(0,5);

   div.innerHTML =
   "<b>"+d.name+"</b><br>"+(d.msg||"")+
   "<div class='meta'>"+time+"</div>";

   box.appendChild(div);
   box.scrollTop=box.scrollHeight;
 });
}

/* ===================== */
/* SETTINGS              */
/* ===================== */

function openSettings(){
 document.getElementById("settings").style.display="block";
}

function closeSettings(){
 document.getElementById("settings").style.display="none";
}

function saveSettings(){
 let img=document.getElementById("img").value;
 privacy=document.getElementById("privacy").checked;

 db.ref("users/"+user).update({
   img:img,
   privacy:privacy
 });

 closeSettings();
}

/* THEME */
function toggleTheme(){
 document.body.classList.toggle("dark");
 localStorage.setItem(
   "theme",
   document.body.classList.contains("dark")?"dark":"light"
 );
}
</script>

</body>
</html>
