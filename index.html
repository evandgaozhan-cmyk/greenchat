<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenChat V5.1</title>

<style>
body { margin:0; font-family:Arial; background:#e5ddd5; }

.header {
  background:#075e54;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.group {
  display:flex;
  align-items:center;
  gap:10px;
}

.group img {
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
  background:white;
}

.menu { position:relative; cursor:pointer; }
.dropdown {
  position:absolute;
  right:0;
  top:30px;
  background:white;
  display:none;
  width:180px;
  border:1px solid #ccc;
}
.dropdown div { padding:10px; }
.dropdown div:hover { background:#eee; }

.chat-box {
  height:65vh;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.bubble {
  max-width:75%;
  padding:10px;
  margin:5px;
  border-radius:12px;
}

.me { align-self:flex-end; background:#dcf8c6; }
.other { align-self:flex-start; background:white; }

.meta { font-size:10px; text-align:right; }

.input {
  display:flex;
  padding:10px;
  background:white;
}

.input input { flex:1; padding:10px; }

.camera { padding:10px; cursor:pointer; }

.room {
  padding:10px;
  border-bottom:1px solid #ccc;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}

#settings, #modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:#0008;
  display:none;
}

.box {
  background:white;
  margin:50px auto;
  padding:20px;
  width:90%;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<input id="name" placeholder="Nama">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- LOBBY -->
<div id="lobby" style="display:none;">
<h3 id="user"></h3>

<input id="roomInput" placeholder="Room">
<button onclick="joinRoom()">Join</button>

<div id="roomList"></div>
<button onclick="logout()">Logout</button>
</div>

<!-- CHAT -->
<div id="chat" style="display:none;">

<div class="header">

  <div class="group">
    <img id="groupImg">
    <div id="roomTitle"></div>
  </div>

  <div class="menu" onclick="toggleMenu()">
    ⋮
    <div class="dropdown" id="dropdown">
      <div onclick="openImg()">Gambar Grup</div>
      <div onclick="showInfo()">Info Grup</div>
      <div onclick="clearChat()">Clear Chat</div>
    </div>
  </div>

</div>

<div id="chatBox" class="chat-box"></div>

<div class="input">
  <div class="camera" onclick="pickImage()">📷</div>
  <input id="msg" placeholder="Ketik...">
  <button onclick="send()">➤</button>
</div>

<input type="file" id="file" hidden onchange="upload(event)">

<button onclick="back()">Back</button>
</div>

<!-- GROUP IMAGE MODAL -->
<div id="modal">
<div class="box">
<h3>Set Group Image</h3>
<input type="file" id="groupFile" onchange="uploadGroupImg(event)">
<button onclick="closeModal()">Close</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAnDdfNeNhS5oYYYNkESOZHCYbwe3boY2Q",
  authDomain: "morse-f36e5.firebaseapp.com",
  databaseURL: "https://morse-f36e5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "morse-f36e5",
  storageBucket: "morse-f36e5.firebasestorage.app",
  messagingSenderId: "41752377914",
  appId: "1:41752377914:web:881b1c19c011d6fea0d303",
  measurementId: "G-RLTTLG36SS"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user="";
let room="";
let admins={};

/* AUTO LOGIN */
window.onload=function(){
 let saved = localStorage.getItem("user");
 if(saved){
   user = saved;
   afterLogin();
 }
 loadRooms();
}

/* LOGIN */
function login(){
 let n=document.getElementById("name").value;
 let p=document.getElementById("pass").value;

 db.ref("users/"+n).once("value",s=>{
   if(!s.exists()){
     db.ref("users/"+n).set({pass:p});
     setUser(n);
   } else {
     if(s.val().pass===p){
       setUser(n);
     } else alert("wrong pass");
   }
 });
}

function setUser(n){
 user=n;
 localStorage.setItem("user",n);
 afterLogin();
}

function afterLogin(){
 document.getElementById("login").style.display="none";
 document.getElementById("lobby").style.display="block";
 document.getElementById("user").innerText=user;
 loadRooms();
}

/* ROOM SYSTEM */
function joinRoom(){
 room=document.getElementById("roomInput").value;

 if(!room) return;

 // save room list
 let rooms = JSON.parse(localStorage.getItem("rooms")||"[]");
 if(!rooms.includes(room)){
   rooms.push(room);
   localStorage.setItem("rooms",JSON.stringify(rooms));
 }
 loadRooms();

 db.ref("rooms/"+room+"/users/"+user).set(true);

 db.ref("rooms/"+room+"/admins/"+user).set(true);

 db.ref("rooms/"+room+"/admins").on("value",s=>{
   admins=s.val()||{};
 });

 db.ref("rooms/"+room+"/img").on("value",s=>{
   let img=s.val();
   document.getElementById("groupImg").src=img||"";
 });

 loadMessages();

 document.getElementById("lobby").style.display="none";
 document.getElementById("chat").style.display="block";
 document.getElementById("roomTitle").innerText=room;
}

/* ROOM LIST */
function loadRooms(){
 let list=document.getElementById("roomList");
 list.innerHTML="";

 let rooms = JSON.parse(localStorage.getItem("rooms")||"[]");

 rooms.forEach(r=>{
   let div=document.createElement("div");
   div.className="room";
   div.innerHTML="💬 "+r;
   div.onclick=()=>{
     document.getElementById("roomInput").value=r;
     joinRoom();
   };
   list.appendChild(div);
 });
}

/* CHAT */
function send(){
 let msg=document.getElementById("msg").value;
 if(!msg)return;

 db.ref("rooms/"+room+"/msg").push({
   name:user,
   msg:msg,
   time:Date.now()
 });

 document.getElementById("msg").value="";
}

/* IMAGE MESSAGE */
function pickImage(){
 document.getElementById("file").click();
}

function upload(e){
 let f=e.target.files[0];
 let r=new FileReader();

 r.onload=function(){
   db.ref("rooms/"+room+"/msg").push({
     name:user,
     img:r.result,
     time:Date.now()
   });
 };

 r.readAsDataURL(f);
}

/* LOAD CHAT */
function loadMessages(){
 let box=document.getElementById("chatBox");
 box.innerHTML="";

 db.ref("rooms/"+room+"/msg").off();

 db.ref("rooms/"+room+"/msg").on("child_added",s=>{
   let d=s.val();

   let div=document.createElement("div");
   div.className="bubble "+(d.name===user?"me":"other");

   let content="";

   if(d.msg){
     content="<b>"+d.name+"</b><br>"+d.msg;
   }

   if(d.img){
     content="<b>"+d.name+"</b><br><img src='"+d.img+"' style='max-width:200px;border-radius:10px'>";
   }

   let time=new Date(d.time).toLocaleTimeString().slice(0,5);

   div.innerHTML=content+"<div class='meta'>"+time+" ✔</div>";

   box.appendChild(div);
   box.scrollTop=box.scrollHeight;
 });
}

/* GROUP IMAGE UPLOAD */
function openImg(){
 document.getElementById("modal").style.display="block";
}

function uploadGroupImg(e){
 let f=e.target.files[0];
 let r=new FileReader();

 r.onload=function(){
   db.ref("rooms/"+room+"/img").set(r.result);
 };

 r.readAsDataURL(f);
 closeModal();
}

function closeModal(){
 document.getElementById("modal").style.display="none";
}

/* MENU */
function toggleMenu(){
 let d=document.getElementById("dropdown");
 d.style.display=d.style.display==="block"?"none":"block";
}

/* INFO */
function showInfo(){
 db.ref("rooms/"+room+"/users").once("value",s=>{
   alert("Users: "+s.numChildren());
 });
}

/* CLEAR */
function clearChat(){
 db.ref("rooms/"+room+"/msg").remove();
}

/* NAV */
function back(){ location.reload(); }
function logout(){
 localStorage.removeItem("user");
 location.reload();
}
</script>

</body>
</html>
