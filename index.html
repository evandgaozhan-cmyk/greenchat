<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenChat V6.1</title>

<style>
body { margin:0; font-family:Arial; display:flex; height:100vh; }

/* DARK MODE */
body.dark { background:#0a0a0a; color:white; }

/* LEFT GROUP */
#left {
  width:25%;
  background:#075e54;
  color:white;
  overflow-y:auto;
}

/* RIGHT DM */
#right {
  width:25%;
  background:#064c45;
  color:white;
  overflow-y:auto;
}

/* MID CHAT */
#mid {
  width:50%;
  display:flex;
  flex-direction:column;
  background:#e5ddd5;
}

body.dark #mid { background:#111; }

.item {
  padding:10px;
  border-bottom:1px solid #0c8;
  cursor:pointer;
  display:flex;
  gap:10px;
  align-items:center;
}

.item img {
  width:35px;
  height:35px;
  border-radius:50%;
  background:white;
}

#chatBox {
  flex:1;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.bubble {
  max-width:70%;
  padding:10px;
  margin:5px;
  border-radius:10px;
}

.me { align-self:flex-end; background:#dcf8c6; }
.other { align-self:flex-start; background:white; }

.meta { font-size:10px; text-align:right; }

#input {
  display:flex;
  padding:10px;
  background:white;
}

#input input { flex:1; }

.header {
  background:#075e54;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

/* SETTINGS */
#settings {
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#0008;
  display:none;
}

.box {
  background:white;
  margin:50px auto;
  padding:20px;
  width:90%;
}
</style>
</head>

<body>

<!-- LEFT GROUP -->
<div id="left">
<h3>Groups</h3>
<div id="groupList"></div>
</div>

<!-- MID CHAT -->
<div id="mid">

<div class="header">
<div id="title">GreenChat</div>
<div onclick="openSettings()">⚙</div>
</div>

<div id="chatBox"></div>

<div id="input">
<input id="msg" placeholder="message">
<button onclick="send()">➤</button>
</div>

</div>

<!-- RIGHT DM -->
<div id="right">
<h3>DM</h3>
<div id="dmList"></div>
</div>

<!-- SETTINGS -->
<div id="settings">
<div class="box">

<h3>Settings</h3>

<input id="img" placeholder="profile image URL"><br><br>

<label>
<input type="checkbox" id="privacy"> privacy mode
</label><br><br>

<button onclick="toggleTheme()">dark/light</button><br><br>
<button onclick="saveSettings()">save</button>
<button onclick="closeSettings()">close</button>

</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAnDdfNeNhS5oYYYNkESOZHCYbwe3boY2Q",
  authDomain: "morse-f36e5.firebaseapp.com",
  databaseURL: "https://morse-f36e5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "morse-f36e5",
  storageBucket: "morse-f36e5.firebasestorage.app",
  messagingSenderId: "41752377914",
  appId: "1:41752377914:web:881b1c19c011d6fea0d303",
  measurementId: "G-RLTTLG36SS"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* ===================== */
/* USER SYSTEM           */
/* ===================== */

let user = localStorage.getItem("user");
let mode = "group";
let target = "main";
let privacy = false;

/* AUTO LOGIN */
window.onload = function(){
 if(!user){
   user = prompt("enter name");
   localStorage.setItem("user",user);
 }

 loadUser();
 loadGroups();
 loadDM();
 openGroup("main");

 let theme = localStorage.getItem("theme");
 if(theme==="dark") document.body.classList.add("dark");
};

/* USER LOAD */
function loadUser(){
 db.ref("users/"+user).set({
   online:true,
   lastSeen:Date.now()
 });

 window.onbeforeunload = ()=>{
   db.ref("users/"+user).update({
     online:false,
     lastSeen:Date.now()
   });
 };
}

/* ===================== */
/* GROUP SYSTEM          */
/* ===================== */

function loadGroups(){
 let box=document.getElementById("groupList");
 box.innerHTML="";

 db.ref("groups").once("value",s=>{
   let d=s.val()||{main:true};

   Object.keys(d).forEach(g=>{
     let div=document.createElement("div");
     div.className="item";
     div.innerHTML="💬 "+g;
     div.onclick=()=>openGroup(g);
     box.appendChild(div);
   });
 });
}

function openGroup(g){
 mode="group";
 target=g;
 document.getElementById("title").innerText=g;
 loadChat();
}

/* ===================== */
/* DM SYSTEM             */
/* ===================== */

function loadDM(){
 let box=document.getElementById("dmList");
 box.innerHTML="";

 db.ref("users").once("value",s=>{
   let u=s.val()||{};

   Object.keys(u).forEach(n=>{
     if(n===user) return;

     let div=document.createElement("div");
     div.className="item";

     let status = u[n].privacy ? "" :
       (u[n].online ? "🟢 online" :
       "last seen "+new Date(u[n].lastSeen).toLocaleTimeString());

     div.innerHTML = `
       <div>
         👤 ${n}
         <div style="font-size:10px">${status}</div>
       </div>
     `;

     div.onclick=()=>openDM(n);
     box.appendChild(div);
   });
 });
}

function openDM(n){
 mode="dm";
 target=n;
 document.getElementById("title").innerText="DM "+n;
 loadChat();
}

/* ===================== */
/* CHAT ENGINE           */
/* ===================== */

function send(){
 let m=document.getElementById("msg").value;
 if(!m) return;

 let path =
 mode==="group"
 ? "groups/"+target+"/msg"
 : "dm/"+[user,target].sort().join("_")+"/msg";

 db.ref(path).push({
   name:user,
   msg:m,
   time:Date.now()
 });

 document.getElementById("msg").value="";
}

function loadChat(){
 let box=document.getElementById("chatBox");
 box.innerHTML="";

 let path =
 mode==="group"
 ? "groups/"+target+"/msg"
 : "dm/"+[user,target].sort().join("_")+"/msg";

 db.ref(path).off();

 db.ref(path).on("child_added",s=>{
   let d=s.val();

   let div=document.createElement("div");
   div.className="bubble "+(d.name===user?"me":"other");

   let time=new Date(d.time).toLocaleTimeString().slice(0,5);

   div.innerHTML =
   "<b>"+d.name+"</b><br>"+(d.msg||"")+
   "<div class='meta'>"+time+"</div>";

   box.appendChild(div);
   box.scrollTop=box.scrollHeight;
 });
}

/* ===================== */
/* SETTINGS              */
/* ===================== */

function openSettings(){
 document.getElementById("settings").style.display="block";
}

function closeSettings(){
 document.getElementById("settings").style.display="none";
}

function saveSettings(){
 let img=document.getElementById("img").value;
 privacy=document.getElementById("privacy").checked;

 db.ref("users/"+user).update({
   img:img,
   privacy:privacy
 });

 closeSettings();
}

/* THEME */
function toggleTheme(){
 document.body.classList.toggle("dark");

 let t=document.body.classList.contains("dark")?"dark":"light";
 localStorage.setItem("theme",t);
}
</script>

</body>
</html>
