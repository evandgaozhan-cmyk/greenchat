<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GreenChat Classic</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #ffffff;
  color: #000;
}

.container { padding: 20px; }

input, button {
  padding: 10px;
  margin: 5px 0;
}

.chat-box {
  height: 300px;
  overflow-y: auto;
  border: 1px solid #ccc;
  padding: 10px;
  display: flex;
  flex-direction: column;
}

/* CHAT BUBBLE */
.bubble {
  max-width: 70%;
  padding: 8px 12px;
  margin: 5px 0;
  border-radius: 10px;
}

.me {
  align-self: flex-end;
  background: #00aa55;
  color: white;
}

.other {
  align-self: flex-start;
  background: #e5e5e5;
}

/* typing */
.typing {
  font-size: 12px;
  color: gray;
}

.room {
  cursor: pointer;
  padding: 5px;
  border-bottom: 1px solid #ccc;
}
</style>
</head>

<body>

<div class="container">

<h2>GreenChat Classic</h2>

<div id="login">
  <input id="name" placeholder="Masukkan nama...">
  <button onclick="saveName()">Masuk</button>
</div>

<div id="lobby" style="display:none;">
  <h3>Halo, <span id="username"></span></h3>

  <input id="roomInput" placeholder="Nama room">
  <button onclick="createRoom()">Buat / Join Room</button>

  <h4>Room kamu:</h4>
  <div id="roomList"></div>
</div>

<div id="chat" style="display:none;">
  <h3 id="roomTitle"></h3>

  <div class="chat-box" id="chatBox"></div>
  <div class="typing" id="typingText"></div>

  <input id="msg" placeholder="Ketik pesan..." oninput="typing()">
  <button onclick="sendMsg()">Kirim</button>
  <button onclick="back()">Kembali</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAnDdfNeNhS5oYYYNkESOZHCYbwe3boY2Q",
  authDomain: "morse-f36e5.firebaseapp.com",
  databaseURL: "https://morse-f36e5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "morse-f36e5",
  storageBucket: "morse-f36e5.firebasestorage.app",
  messagingSenderId: "41752377914",
  appId: "1:41752377914:web:881b1c19c011d6fea0d303",
  measurementId: "G-RLTTLG36SS"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = localStorage.getItem("name");
let currentRoom = "";
let typingTimeout;

// LOGIN
function saveName() {
  const name = document.getElementById("name").value;
  if (!name) return;

  localStorage.setItem("name", name);
  username = name;

  Notification.requestPermission();
  showLobby();
}

function showLobby() {
  document.getElementById("login").style.display = "none";
  document.getElementById("lobby").style.display = "block";
  document.getElementById("username").innerText = username;
  loadRooms();
}

// ROOM
function createRoom() {
  const room = document.getElementById("roomInput").value;
  if (!room) return;
  joinRoom(room);
}

function joinRoom(room) {
  currentRoom = room;

  let rooms = JSON.parse(localStorage.getItem("rooms") || "[]");
  if (!rooms.includes(room)) {
    rooms.push(room);
    localStorage.setItem("rooms", JSON.stringify(rooms));
  }

  document.getElementById("lobby").style.display = "none";
  document.getElementById("chat").style.display = "block";
  document.getElementById("roomTitle").innerText = room;

  loadMessages();
  listenTyping();
}

function loadRooms() {
  const list = document.getElementById("roomList");
  list.innerHTML = "";

  let rooms = JSON.parse(localStorage.getItem("rooms") || "[]");

  rooms.forEach(r => {
    let div = document.createElement("div");
    div.className = "room";
    div.innerText = r;
    div.onclick = () => joinRoom(r);
    list.appendChild(div);
  });
}

// CHAT
function sendMsg() {
  const msg = document.getElementById("msg").value;
  if (!msg) return;

  db.ref("rooms/" + currentRoom + "/messages").push({
    name: username,
    msg: msg
  });

  document.getElementById("msg").value = "";

  // stop typing
  db.ref("rooms/" + currentRoom + "/typing/" + username).set(false);
}

function loadMessages() {
  const chatBox = document.getElementById("chatBox");
  chatBox.innerHTML = "";

  db.ref("rooms/" + currentRoom + "/messages").off();

  db.ref("rooms/" + currentRoom + "/messages").on("child_added", data => {
    let d = data.val();

    let div = document.createElement("div");
    div.className = "bubble " + (d.name === username ? "me" : "other");
    div.innerText = d.name + ": " + d.msg;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;

    // notif
    if (document.hidden && d.name !== username) {
      new Notification(d.name, { body: d.msg });
    }
  });
}

// TYPING SYSTEM
function typing() {
  db.ref("rooms/" + currentRoom + "/typing/" + username).set(true);

  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    db.ref("rooms/" + currentRoom + "/typing/" + username).set(false);
  }, 2000);
}

function listenTyping() {
  const typingText = document.getElementById("typingText");

  db.ref("rooms/" + currentRoom + "/typing").on("value", snap => {
    let data = snap.val();
    if (!data) return typingText.innerText = "";

    let usersTyping = Object.keys(data).filter(u => data[u] && u !== username);

    if (usersTyping.length > 0) {
      typingText.innerText = usersTyping.join(", ") + " sedang mengetik...";
    } else {
      typingText.innerText = "";
    }
  });
}

// BACK
function back() {
  document.getElementById("chat").style.display = "none";
  document.getElementById("lobby").style.display = "block";
}

// AUTO LOGIN
if (username) showLobby();
</script>

</body>
</html>
