<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenChat</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#e5ddd5;
  display:flex;
  justify-content:center;
}

body.dark { background:#0a0a0a; color:#00ff88; }
body.light { background:#e5ddd5; color:#000; }

.container {
  width:100%;
  max-width:420px;
  padding:10px;
}

/* INPUT */
input, button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

/* BUTTON */
button {
  background:#00aa55;
  color:white;
}

/* CHAT BOX */
.chat-box {
  height:350px;
  overflow-y:auto;
  padding:10px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  background:#e5ddd5;
}

/* BUBBLE */
.bubble {
  max-width:75%;
  padding:10px;
  margin:5px 0;
  border-radius:12px;
  word-wrap:break-word;
  font-size:14px;
}

.me {
  align-self:flex-end;
  background:#dcf8c6;
  color:#000;
  border-bottom-right-radius:4px;
}

.other {
  align-self:flex-start;
  background:#fff;
  color:#000;
  border-bottom-left-radius:4px;
}

/* META */
.meta {
  font-size:10px;
  opacity:0.7;
  text-align:right;
}

/* ROOM */
.room {
  padding:6px;
  border-bottom:1px solid #aaa;
  cursor:pointer;
}

/* TOP BAR */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.smallbtn {
  width:auto;
  padding:5px 10px;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
  <h3>GreenChat</h3>
  <button class="smallbtn" onclick="openSettings()">⚙</button>
</div>

<!-- LOGIN -->
<div id="login">
<input id="name" placeholder="Nama...">
<button onclick="saveName()">Masuk</button>
</div>

<!-- LOBBY -->
<div id="lobby" style="display:none;">
<h4>Halo, <span id="username"></span></h4>

<input id="roomInput" placeholder="Room">
<button onclick="joinRoom()">Join</button>

<div id="roomList"></div>

<button onclick="logout()">Logout</button>
</div>

<!-- CHAT -->
<div id="chat" style="display:none;">
<h4 id="roomTitle"></h4>

<div id="chatBox" class="chat-box"></div>

<input id="msg" placeholder="Ketik...">
<button onclick="sendMsg()">Kirim</button>
<button onclick="back()">Back</button>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAnDdfNeNhS5oYYYNkESOZHCYbwe3boY2Q",
  authDomain: "morse-f36e5.firebaseapp.com",
  databaseURL: "https://morse-f36e5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "morse-f36e5",
  storageBucket: "morse-f36e5.firebasestorage.app",
  messagingSenderId: "41752377914",
  appId: "1:41752377914:web:881b1c19c011d6fea0d303"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username="";
let currentRoom="";

/* LOGIN */
function saveName(){
 let n=document.getElementById("name").value.trim();
 if(!n)return alert("isi nama dulu");

 localStorage.setItem("name",n);
 username=n;
 showLobby();
}

/* AUTO LOGIN */
window.onload=function(){
 let saved=localStorage.getItem("name");
 if(saved){
   username=saved;
   showLobby();
 }
};

/* LOBBY */
function showLobby(){
 document.getElementById("login").style.display="none";
 document.getElementById("lobby").style.display="block";
 document.getElementById("username").innerText=username;
 loadRooms();
}

/* LOGOUT */
function logout(){
 localStorage.removeItem("name");
 location.reload();
}

/* ROOM */
function joinRoom(){
 let room=document.getElementById("roomInput").value;
 if(!room)return;

 currentRoom=room;

 let rooms=JSON.parse(localStorage.getItem("rooms")||"[]");
 if(!rooms.includes(room)){
   rooms.push(room);
   localStorage.setItem("rooms",JSON.stringify(rooms));
 }

 document.getElementById("lobby").style.display="none";
 document.getElementById("chat").style.display="block";
 document.getElementById("roomTitle").innerText=room;

 loadMessages();
}

/* ROOMS LIST */
function loadRooms(){
 let list=document.getElementById("roomList");
 list.innerHTML="";

 let rooms=JSON.parse(localStorage.getItem("rooms")||"[]");

 rooms.forEach(r=>{
   let div=document.createElement("div");
   div.className="room";
   div.innerText=r;
   div.onclick=()=>{
     document.getElementById("roomInput").value=r;
     joinRoom();
   };
   list.appendChild(div);
 });
}

/* SEND MSG */
function sendMsg(){
 let msg=document.getElementById("msg").value;
 if(!msg)return;

 db.ref("rooms/"+currentRoom).push({
   name: username,
   msg: msg,
   time: Date.now(),
   read: false
 });

 document.getElementById("msg").value="";
}

/* LOAD CHAT */
function loadMessages(){
 let box=document.getElementById("chatBox");
 box.innerHTML="";

 db.ref("rooms/"+currentRoom).off();

 db.ref("rooms/"+currentRoom).on("child_added",snap=>{
   let key=snap.key;
   let d=snap.val();
   if(!d.msg)return;

   // mark read kalau bukan kita
   if(d.name !== username){
     db.ref("rooms/"+currentRoom+"/"+key+"/read").set(true);
   }

   let div=document.createElement("div");
   div.className="bubble "+(d.name===username?"me":"other");

   let t=new Date(d.time);
   let time=t.getHours()+":"+String(t.getMinutes()).padStart(2,"0");

   let tickColor = d.read ? "#00aaff" : "#888";

   div.innerHTML=
   "<b>"+d.name+"</b><br>"+
   d.msg+
   "<div class='meta'>"+time+" <span style='color:"+tickColor+"'>✔</span></div>";

   box.appendChild(div);
   box.scrollTop=box.scrollHeight;
 });
}

/* BACK */
function back(){
 document.getElementById("chat").style.display="none";
 document.getElementById("lobby").style.display="block";
}

/* SETTINGS */
function openSettings(){
 alert(
   "Settings:\n\n" +
   "Nama: " + username + "\n" +
   "Room: " + currentRoom + "\n\n" +
   "Mode UI bisa kamu upgrade nanti 👍"
 );
}
</script>

</body>
</html>
