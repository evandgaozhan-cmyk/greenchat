<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenChat V5.2</title>

<style>
body { margin:0; font-family:Arial; background:#e5ddd5; }
body.dark { background:#0a0a0a; color:#0f0; }

.header {
  background:#075e54;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.group { display:flex; align-items:center; gap:10px; }

.group img {
  width:40px; height:40px; border-radius:50%;
  object-fit:cover; background:white;
}

.menu { position:relative; cursor:pointer; }
.dropdown {
  position:absolute; right:0; top:30px;
  background:white; display:none; width:180px;
}
.dropdown div { padding:10px; }
.dropdown div:hover { background:#eee; }

.chat-box {
  height:65vh; overflow-y:auto;
  padding:10px; display:flex; flex-direction:column;
}

.bubble { max-width:75%; padding:10px; margin:5px; border-radius:12px; }
.me { align-self:flex-end; background:#dcf8c6; }
.other { align-self:flex-start; background:white; }

.meta { font-size:10px; text-align:right; }

.input { display:flex; padding:10px; background:white; }
.input input { flex:1; padding:10px; }

.camera { padding:10px; cursor:pointer; }

.room {
  padding:10px;
  border-bottom:1px solid #ccc;
  cursor:pointer;
}

#settings, #modal {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  background:#0008; display:none;
}

.box {
  background:white;
  margin:50px auto;
  padding:20px;
  width:90%;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<input id="name" placeholder="Nama">
<input id="pass" type="password" placeholder="Password">
<button onclick="loginUser()">Login</button>
</div>

<!-- LOBBY -->
<div id="lobby" style="display:none;">
<h3 id="user"></h3>

<input id="roomInput" placeholder="Room">
<button onclick="joinRoom()">Join</button>

<div id="roomList"></div>
<button onclick="openSettings()">Settings</button>
<button onclick="logout()">Logout</button>
</div>

<!-- CHAT -->
<div id="chat" style="display:none;">

<div class="header">
  <div class="group">
    <img id="groupImg">
    <div id="roomTitle"></div>
  </div>

  <div class="menu" onclick="toggleMenu()">
    ⋮
    <div class="dropdown" id="dropdown">
      <div onclick="openImg()">Gambar Grup</div>
      <div onclick="showInfo()">Info Grup</div>
      <div onclick="clearChat()">Clear Chat</div>
      <div onclick="openSettings()">Settings</div>
    </div>
  </div>
</div>

<div id="chatBox" class="chat-box"></div>

<div class="input">
  <div class="camera" onclick="pickImage()">📷</div>
  <input id="msg" placeholder="Ketik...">
  <button onclick="send()">➤</button>
</div>

<input type="file" id="file" hidden onchange="upload(event)">
<button onclick="back()">Back</button>
</div>

<!-- SETTINGS -->
<div id="settings">
<div class="box">
<h3>Settings</h3>

<label>
<input type="checkbox" id="privacy"> Privacy Mode
</label><br><br>

<button onclick="toggleTheme()">Dark/Light</button>
<button onclick="closeSettings()">Close</button>
</div>
</div>

<!-- GROUP IMG -->
<div id="modal">
<div class="box">
<h3>Set Group Image</h3>
<input type="file" onchange="uploadGroupImg(event)">
<button onclick="closeModal()">Close</button>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAnDdfNeNhS5oYYYNkESOZHCYbwe3boY2Q",
  authDomain: "morse-f36e5.firebaseapp.com",
  databaseURL: "https://morse-f36e5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "morse-f36e5",
  storageBucket: "morse-f36e5.firebasestorage.app",
  messagingSenderId: "41752377914",
  appId: "1:41752377914:web:881b1c19c011d6fea0d303",
  measurementId: "G-RLTTLG36SS"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let user="", room="", admins={}, locked=false;

/* AUTO LOGIN */
window.onload=function(){
 let u=localStorage.getItem("user");
 let p=localStorage.getItem("pass");

 if(u && p){
   db.ref("users/"+u).once("value",s=>{
     if(s.exists() && s.val().pass===p){
       user=u;
       afterLogin();
     }else localStorage.clear();
   });
 }

 if(localStorage.getItem("theme")==="dark"){
   document.body.classList.add("dark");
 }

 if(localStorage.getItem("privacy")){
   privacy.checked=true;
 }

 loadRooms();
};

/* LOGIN */
function loginUser(){
 let n=name.value.trim().toLowerCase();
 let p=pass.value;

 db.ref("users/"+n).once("value",s=>{
   if(!s.exists()){
     db.ref("users/"+n).set({pass:p});
     setUser(n,p);
   }else{
     if(s.val().pass===p){
       setUser(n,p);
     }else alert("wrong pass");
   }
 });
}

function setUser(n,p){
 user=n;
 localStorage.setItem("user",n);
 localStorage.setItem("pass",p);
 afterLogin();
}

function afterLogin(){
 document.getElementById("login").style.display="none";
 document.getElementById("lobby").style.display="block";
 document.getElementById("user").innerText=user;
}

/* SETTINGS */
function openSettings(){ settings.style.display="block"; }
function closeSettings(){ settings.style.display="none"; }

privacy.onchange=function(){
 localStorage.setItem("privacy", this.checked?"1":"");
};

function toggleTheme(){
 document.body.classList.toggle("dark");
 localStorage.setItem("theme",
  document.body.classList.contains("dark")?"dark":"light"
 );
}

/* ROOM */
function joinRoom(){
 room=roomInput.value;
 if(!room)return;

 let rooms=JSON.parse(localStorage.getItem("rooms")||"[]");
 if(!rooms.includes(room)){
   rooms.push(room);
   localStorage.setItem("rooms",JSON.stringify(rooms));
 }

 db.ref("rooms/"+room).once("value",s=>{
   if(!s.exists()){
     db.ref("rooms/"+room+"/admins/"+user).set(true);
   }
 });

 db.ref("rooms/"+room+"/admins").on("value",s=>{
   admins=s.val()||{};
 });

 db.ref("rooms/"+room+"/locked").on("value",s=>{
   locked=s.val();
 });

 db.ref("rooms/"+room+"/img").on("value",s=>{
   groupImg.src=s.val()||"";
 });

 loadMessages();

 lobby.style.display="none";
 chat.style.display="block";
 roomTitle.innerText=room;
 loadRooms();
}

/* ADMIN */
function isAdmin(){
 return user==="admin" || admins[user];
}

/* SEND */
function send(){
 let m=msg.value;
 if(!m)return;

 if(locked && !isAdmin()){
   alert("room di lock");
   return;
 }

 if(m.startsWith("/")){
   handleCmd(m);
   msg.value="";
   return;
 }

 db.ref("rooms/"+room+"/msg").push({
   name:user,
   msg:m,
   time:Date.now()
 });

 msg.value="";
}

/* COMMAND */
function handleCmd(m){
 if(!isAdmin()) return alert("bukan admin");

 let a=m.split(" ");

 if(a[0]==="/lock"){
   db.ref("rooms/"+room+"/locked").set(true);
 }

 if(a[0]==="/add"){
   db.ref("rooms/"+room+"/admins/"+a[1]).set(true);
 }

 if(a[0]==="/kick"){
   let u=a[1];
   let sec=parseInt(a[2])||60;
   db.ref("rooms/"+room+"/kicked/"+u).set(Date.now()+sec*1000);
 }

 if(a[0]==="/clear"){
   db.ref("rooms/"+room+"/msg").remove();
 }
}

/* IMAGE */
function pickImage(){ file.click(); }

function upload(e){
 let r=new FileReader();
 r.onload=function(){
   db.ref("rooms/"+room+"/msg").push({
     name:user,
     img:r.result,
     time:Date.now()
   });
 };
 r.readAsDataURL(e.target.files[0]);
}

/* LOAD */
function loadMessages(){
 chatBox.innerHTML="";
 db.ref("rooms/"+room+"/msg").off();

 db.ref("rooms/"+room+"/msg").on("child_added",s=>{
   let d=s.val();

   let div=document.createElement("div");
   div.className="bubble "+(d.name===user?"me":"other");

   let content="";
   if(d.msg) content="<b>"+d.name+"</b><br>"+d.msg;
   if(d.img) content="<b>"+d.name+"</b><br><img src='"+d.img+"' style='max-width:200px'>";

   let time=new Date(d.time).toLocaleTimeString().slice(0,5);
   let tick=localStorage.getItem("privacy")?"":"✔";

   div.innerHTML=content+"<div class='meta'>"+time+" "+tick+"</div>";

   chatBox.appendChild(div);
   chatBox.scrollTop=chatBox.scrollHeight;
 });
}

/* EXTRA */
function loadRooms(){
 roomList.innerHTML="";
 let rooms=JSON.parse(localStorage.getItem("rooms")||"[]");
 rooms.forEach(r=>{
   let d=document.createElement("div");
   d.className="room";
   d.innerText="💬 "+r;
   d.onclick=()=>{roomInput.value=r; joinRoom();}
   roomList.appendChild(d);
 });
}

function clearChat(){
 if(!isAdmin()) return alert("bukan admin");
 db.ref("rooms/"+room+"/msg").remove();
}

function showInfo(){
 db.ref("rooms/"+room+"/users").once("value",s=>{
   alert("Users: "+s.numChildren());
 });
}

function toggleMenu(){
 dropdown.style.display =
 dropdown.style.display==="block"?"none":"block";
}

function openImg(){ modal.style.display="block"; }
function closeModal(){ modal.style.display="none"; }

function uploadGroupImg(e){
 let r=new FileReader();
 r.onload=function(){
   db.ref("rooms/"+room+"/img").set(r.result);
 };
 r.readAsDataURL(e.target.files[0]);
 closeModal();
}

function back(){ location.reload(); }
function logout(){
 localStorage.clear();
 location.reload();
}
</script>

</body>
</html>
