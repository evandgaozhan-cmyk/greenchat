<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenChat</title>

<style>
body{margin:0;font-family:Arial;display:flex;justify-content:center;background:#e5ddd5;}
.container{width:100%;max-width:420px;padding:10px;}

input,button{
 width:100%;padding:10px;margin:5px 0;border:none;border-radius:8px;
}

.chat-box{
 height:300px;overflow-y:auto;padding:10px;border-radius:10px;
 background:#fff;display:flex;flex-direction:column;
}

.bubble{
 max-width:75%;padding:8px;margin:4px 0;border-radius:10px;
}

.me{align-self:flex-end;background:#dcf8c6;}
.other{align-self:flex-start;background:#eee;}

.meta{font-size:10px;opacity:0.6;text-align:right;}

.room{padding:8px;border-bottom:1px solid #ccc;cursor:pointer;}
</style>
</head>

<body>

<div class="container">

<h2>GreenChat</h2>

<!-- LOGIN -->
<div id="login">
<input id="name" placeholder="Nama">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Masuk</button>
</div>

<!-- LOBBY -->
<div id="lobby" style="display:none">
<h3>Halo, <span id="username"></span></h3>

<input id="roomInput" placeholder="Room">
<button onclick="joinRoom()">Join</button>
<button onclick="makeRoom()">Make</button>

<h4>Rooms</h4>
<div id="roomList"></div>

<button onclick="logout()">Logout</button>
</div>

<!-- CHAT -->
<div id="chat" style="display:none">
<h3 id="roomTitle"></h3>
<div id="chatBox" class="chat-box"></div>

<input id="msg" placeholder="Ketik...">
<button onclick="sendMsg()">Kirim</button>
<button onclick="back()">Back</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAnDdfNeNhS5oYYYNkESOZHCYbwe3boY2Q",
  authDomain: "morse-f36e5.firebaseapp.com",
  databaseURL: "https://morse-f36e5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "morse-f36e5",
  storageBucket: "morse-f36e5.firebasestorage.app",
  messagingSenderId: "41752377914",
  appId: "1:41752377914:web:881b1c19c011d6fea0d303",
  measurementId: "G-RLTTLG36SS"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let username="", currentRoom="";

/* LOGIN */
function login(){
 let n=name.value.trim();
 let p=pass.value.trim();
 if(!n||!p)return alert("isi semua");

 db.ref("users/"+n).once("value",snap=>{
   if(!snap.exists()){
     // user baru
     db.ref("users/"+n).set({pass:p});
     enter(n,p);
   }else{
     let savedPass = snap.val().pass;

     if(savedPass === p){
       // password cocok → BOLEH LOGIN (termasuk admin)
       enter(n,p);
     }else{
       alert("nama sudah dipakai");
     }
   }
 });
}

function enter(n,p){
 username=n;
 localStorage.setItem("user",n);
 localStorage.setItem("pass",p);

 document.getElementById("login").style.display="none";
 document.getElementById("lobby").style.display="block";
 document.getElementById("username").innerText=username;

 loadRooms();
}

/* AUTO LOGIN */
window.onload=()=>{
 let u=localStorage.getItem("user");
 let p=localStorage.getItem("pass");
 if(u&&p){
   name.value=u;
   pass.value=p;
   login();
 }
};

/* LOGOUT */
function logout(){
 localStorage.clear();
 location.reload();
}

/* ROOM */
function makeRoom(){
 let r=roomInput.value;
 if(!r)return;

 db.ref("rooms/"+r).set({
   admins:{[username]:true},
   locked:false
 });

 saveRoomLocal(r);
 loadRooms();
}

function joinRoom(){
 let r=roomInput.value;
 if(!r)return;

 checkKick(r,(kicked)=>{
   if(kicked){
     alert("kamu sedang di-kick");
     return;
   }
   saveRoomLocal(r);
   openRoom(r);
 });
}

/* SAVE ROOM */
function saveRoomLocal(r){
 let rooms=JSON.parse(localStorage.getItem("rooms")||"[]");
 if(!rooms.includes(r)){
   rooms.push(r);
   localStorage.setItem("rooms",JSON.stringify(rooms));
 }
}

/* LOAD ROOMS */
function loadRooms(){
 roomList.innerHTML="";
 let rooms=JSON.parse(localStorage.getItem("rooms")||"[]");

 rooms.forEach(r=>{
   let div=document.createElement("div");
   div.className="room";
   div.innerText=r;
   div.onclick=()=>openRoom(r);
   roomList.appendChild(div);
 });
}

/* OPEN ROOM */
function openRoom(r){
 currentRoom=r;
 document.getElementById("lobby").style.display="none";
 document.getElementById("chat").style.display="block";
 document.getElementById("roomTitle").innerText=r;
 loadMessages();
}

/* BACK */
function back(){
 document.getElementById("chat").style.display="none";
 document.getElementById("lobby").style.display="block";
}

/* ADMIN CHECK */
function isAdmin(callback){
 db.ref("rooms/"+currentRoom+"/admins/"+username).once("value",snap=>{
   callback(username==="admin" || snap.exists());
 });
}

/* KICK CHECK */
function checkKick(room,cb){
 db.ref("rooms/"+room+"/kicked/"+username).once("value",snap=>{
   if(!snap.exists()) return cb(false);

   let until=snap.val();
   cb(Date.now()<until);
 });
}

/* SEND */
function sendMsg(){
 let m=msg.value;
 if(!m)return;

 checkKick(currentRoom,(kicked)=>{
   if(kicked)return alert("kamu di-kick");

   db.ref("rooms/"+currentRoom+"/locked").once("value",snap=>{
     let locked=snap.val();

     isAdmin(isAdm=>{
       if(locked && !isAdm){
         alert("room di-lock");
         return;
       }

       /* COMMAND */
       if(m.startsWith("/")){
         handleCommand(m);
         msg.value="";
         return;
       }

       db.ref("rooms/"+currentRoom+"/msg").push({
         name:username,
         msg:m,
         time:Date.now()
       });

       msg.value="";
     });
   });
 });
}

/* COMMAND HANDLER */
function handleCommand(cmd){
 isAdmin(isAdm=>{
   if(!isAdm)return alert("bukan admin");

   let args=cmd.split(" ");

   if(args[0]==="/clear"){
     db.ref("rooms/"+currentRoom+"/msg").remove();
   }

   if(args[0]==="/lock"){
     db.ref("rooms/"+currentRoom+"/locked").set(true);
   }

   if(args[0]==="/add"){
     let u=args[1];
     db.ref("rooms/"+currentRoom+"/admins/"+u).set(true);
   }

   if(args[0]==="/kick"){
     let u=args[1];
     let sec=parseInt(args[2])||60;

     let until=Date.now()+sec*1000;
     db.ref("rooms/"+currentRoom+"/kicked/"+u).set(until);
   }
 });
}

/* LOAD MSG */
function loadMessages(){
 chatBox.innerHTML="";

 db.ref("rooms/"+currentRoom+"/msg").off();

 db.ref("rooms/"+currentRoom+"/msg").on("child_added",snap=>{
   let d=snap.val();

   let div=document.createElement("div");
   div.className="bubble "+(d.name===username?"me":"other");

   let t=new Date(d.time);
   let time=t.getHours()+":"+String(t.getMinutes()).padStart(2,"0");

   div.innerHTML="<b>"+d.name+"</b><br>"+d.msg+"<div class='meta'>"+time+"</div>";

   chatBox.appendChild(div);
   chatBox.scrollTop=chatBox.scrollHeight;
 });
}
</script>

</body>
</html>
