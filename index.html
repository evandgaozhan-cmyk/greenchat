<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenChat</title>

<style>
body { font-family:Arial; margin:0; background:#e5ddd5; }
.container { max-width:420px; margin:auto; }

.chat-box {
  height:60vh;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.bubble {
  max-width:75%;
  padding:10px;
  margin:5px;
  border-radius:10px;
}

.me { align-self:flex-end; background:#dcf8c6; }
.other { align-self:flex-start; background:white; }

.meta { font-size:10px; text-align:right; }
</style>
</head>

<body>

<div class="container">

<div id="login">
<input id="name" placeholder="Nama...">
<button onclick="login()">Masuk</button>
</div>

<div id="lobby" style="display:none;">
<h3 id="user"></h3>
<input id="room" placeholder="Room">
<button onclick="join()">Join</button>
</div>

<div id="chat" style="display:none;">
<h3 id="roomTitle"></h3>
<div id="chatBox" class="chat-box"></div>

<input id="msg">
<button onclick="send()">Kirim</button>
<button onclick="back()">Back</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAnDdfNeNhS5oYYYNkESOZHCYbwe3boY2Q",
  authDomain: "morse-f36e5.firebaseapp.com",
  databaseURL: "https://morse-f36e5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "morse-f36e5",
  storageBucket: "morse-f36e5.firebasestorage.app",
  messagingSenderId: "41752377914",
  appId: "1:41752377914:web:881b1c19c011d6fea0d303",
  measurementId: "G-RLTTLG36SS"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username="";
let room="";
let isAdmin=false;
let admins={};
let locked=false;

/* LOGIN */
function login(){
 let n=document.getElementById("name").value;
 if(!n)return;

 db.ref("users/"+n).once("value",snap=>{
   if(snap.exists()){
     alert("nama sudah dipakai!");
   } else {
     db.ref("users/"+n).set(true);
     username=n;
     document.getElementById("login").style.display="none";
     document.getElementById("lobby").style.display="block";
     document.getElementById("user").innerText="Halo "+n;
   }
 });
}

/* JOIN */
function join(){
 room=document.getElementById("room").value;
 if(!room)return;

 // init admin list
 db.ref("rooms/"+room+"/admins").once("value",snap=>{
   if(!snap.exists()){
     db.ref("rooms/"+room+"/admins/"+username).set(true);
   }
 });

 db.ref("rooms/"+room+"/admins").on("value",snap=>{
   admins=snap.val()||{};
   isAdmin = admins[username] || username==="admin";
 });

 db.ref("rooms/"+room+"/lock").on("value",s=>{
   locked=s.val()===true;
 });

 document.getElementById("lobby").style.display="none";
 document.getElementById("chat").style.display="block";
 document.getElementById("roomTitle").innerText=room;

 load();
}

/* SEND */
function send(){
 let text=document.getElementById("msg").value;
 if(!text)return;

 if(locked && !isAdmin){
   alert("room dikunci!");
   return;
 }

 // cek kick
 db.ref("rooms/"+room+"/kick/"+username).once("value",snap=>{
   let until=snap.val();
   if(until && Date.now()<until){
     alert("kamu di-kick sementara!");
     return;
   }

   if(text.startsWith("/")){
     command(text);
     return;
   }

   db.ref("rooms/"+room+"/msg").push({
     name:username,
     text:text,
     time:Date.now()
   });

   document.getElementById("msg").value="";
 });
}

/* COMMAND */
function command(cmd){
 let p=cmd.split(" ");

 if(!isAdmin){
   alert("bukan admin!");
   return;
 }

 if(p[0]==="/add"){
   db.ref("rooms/"+room+"/admins/"+p[1]).set(true);
 }

 if(p[0]==="/clear"){
   db.ref("rooms/"+room+"/msg").remove();
 }

 if(p[0]==="/lock"){
   db.ref("rooms/"+room+"/lock").set(true);
 }

 if(p[0]==="/kick"){
   let name=p[1];
   let sec=parseInt(p[2])||10;
   let until=Date.now()+sec*1000;

   db.ref("rooms/"+room+"/kick/"+name).set(until);
 }
}

/* LOAD */
function load(){
 let box=document.getElementById("chatBox");
 box.innerHTML="";

 db.ref("rooms/"+room+"/msg").off();

 db.ref("rooms/"+room+"/msg").on("child_added",snap=>{
   let d=snap.val();

   let div=document.createElement("div");
   div.className="bubble "+(d.name===username?"me":"other");

   let name=d.name;
   if(admins[d.name] || d.name==="admin"){
     name+=" (admin)";
   }

   let time=new Date(d.time).toLocaleTimeString().slice(0,5);

   div.innerHTML=
   "<b>"+name+"</b><br>"+d.text+
   "<div class='meta'>"+time+"</div>";

   box.appendChild(div);
   box.scrollTop=box.scrollHeight;
 });
}

/* BACK */
function back(){
 document.getElementById("chat").style.display="none";
 document.getElementById("lobby").style.display="block";
}
</script>

</body>
</html>
