<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GreenChat</title>
</head>

<body style="background:black;color:#00ff88;font-family:Arial">

<h2>GreenChat</h2>

<!-- LOGIN -->
<div id="login">
  <input id="name" placeholder="Nama">
  <button onclick="saveName()">Masuk</button>
</div>

<!-- LOBBY -->
<div id="lobby" style="display:none;">
  <h3>Halo, <span id="username"></span></h3>
  <input id="roomInput" placeholder="Room">
  <button onclick="createRoom()">Join</button>
</div>

<!-- CHAT -->
<div id="chat" style="display:none;">
  <h3 id="roomTitle"></h3>
  <div id="chatBox" style="height:300px;overflow:auto;background:#111"></div>
  <input id="msg">
  <button onclick="sendMsg()">Kirim</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-messaging.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAnDdfNeNhS5oYYYNkESOZHCYbwe3boY2Q",
  authDomain: "morse-f36e5.firebaseapp.com",
  databaseURL: "https://morse-f36e5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "morse-f36e5",
  storageBucket: "morse-f36e5.firebasestorage.app",
  messagingSenderId: "41752377914",
  appId: "1:41752377914:web:881b1c19c011d6fea0d303",
  measurementId: "G-RLTTLG36SS"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const messaging = firebase.messaging();

let username = "";
let currentRoom = "";

// 🔔 NOTIF + TOKEN
Notification.requestPermission().then(() => {
  messaging.getToken({
    vapidKey: "BMMSDF3f-Zbitwi1FAhHr9TSvMxXAa1eg_aaD6hSfPr7h_SUKSOs_eohZSqWlFESotd0Q1OPq7jO3gry00Ofguw"
  }).then((token) => {
    console.log("TOKEN:", token);
    db.ref("tokens").push(token);
  });
});

// 🔊 SOUND
let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

// LOGIN
function saveName() {
  username = document.getElementById("name").value;
  document.getElementById("login").style.display = "none";
  document.getElementById("lobby").style.display = "block";
  document.getElementById("username").innerText = username;
}

// ROOM
function createRoom() {
  currentRoom = document.getElementById("roomInput").value;
  document.getElementById("lobby").style.display = "none";
  document.getElementById("chat").style.display = "block";
  document.getElementById("roomTitle").innerText = currentRoom;
  loadMessages();
}

// KIRIM
function sendMsg() {
  let msg = document.getElementById("msg").value;
  if (!msg) return;

  db.ref("rooms/" + currentRoom).push({
    name: username,
    msg: msg
  });

  handleBot(msg);

  document.getElementById("msg").value = "";
}

// LOAD CHAT
function loadMessages() {
  const chatBox = document.getElementById("chatBox");
  chatBox.innerHTML = "";

  db.ref("rooms/" + currentRoom).on("child_added", data => {
    let d = data.val();

    let div = document.createElement("div");
    div.innerText = d.name + ": " + d.msg;
    chatBox.appendChild(div);

    // 🔔 NOTIF
    if (Notification.permission === "granted") {
      new Notification(d.name, { body: d.msg });
      audio.play();
    }

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

//////////////////////////////////////////////////////
// 🤖 BOT SYSTEM v0.5
//////////////////////////////////////////////////////

let admins = ["Evand"];

function handleBot(msg) {
  if (!msg.startsWith("/bot")) return;

  if (msg === "/bot") {
    sendBot(`hello there! what can i help

1. jumlah pesan
2. kick orang
3. pilih admin
4. ngobrol`);
  }

  else if (msg.includes("jumlah")) {
    db.ref("rooms/" + currentRoom).once("value", snap => {
      sendBot("jumlah pesan: " + snap.numChildren());
    });
  }

  else if (msg.startsWith("/bot admin")) {
    if (!admins.includes(username)) {
      sendBot("kamu bukan admin");
      return;
    }

    let target = msg.split(" ")[2];
    admins.push(target);
    sendBot(target + " sekarang admin");
  }

  else if (msg.startsWith("/bot kick")) {
    if (!admins.includes(username)) {
      sendBot("kamu bukan admin");
      return;
    }

    let target = msg.split(" ")[2];
    sendBot(target + " telah di-kick (simulasi)");
  }

  else if (msg.startsWith("/bot say")) {
    let text = msg.replace("/bot say ", "");
    sendBot("kamu bilang: " + text);
  }

  else {
    sendBot("perintah tidak dikenal");
  }
}

function sendBot(text) {
  db.ref("rooms/" + currentRoom).push({
    name: "BOT",
    msg: text
  });
}
</script>

</body>
</html>
