<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenChat</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#e5ddd5;
  display:flex;
  justify-content:center;
}

.container {
  width:100%;
  max-width:420px;
}

/* HEADER */
.header {
  background:#075e54;
  color:white;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* CHAT */
.chat-box {
  height:70vh;
  overflow-y:auto;
  padding:10px;
  display:flex;
  flex-direction:column;
}

.bubble {
  max-width:75%;
  padding:10px;
  margin:5px;
  border-radius:12px;
}

.me { align-self:flex-end; background:#dcf8c6; }
.other { align-self:flex-start; background:white; }

.meta { font-size:10px; text-align:right; }

/* INPUT */
.input-area {
  display:flex;
  padding:10px;
  background:white;
}
.input-area input {
  flex:1;
  padding:10px;
}
.input-area button {
  margin-left:5px;
}

/* SETTINGS */
#settings {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000000cc;
  display:none;
}

.settings-box {
  background:white;
  margin:50px auto;
  padding:20px;
  width:90%;
  max-width:350px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <span>GreenChat</span>
  <button onclick="openSettings()">⚙</button>
</div>

<!-- LOGIN -->
<div id="login">
<input id="name" placeholder="Nama...">
<button onclick="saveName()">Masuk</button>
</div>

<!-- LOBBY -->
<div id="lobby" style="display:none;">
<h3>Halo, <span id="username"></span></h3>

<input id="roomInput" placeholder="Room">
<button onclick="joinRoom()">Join</button>

<div id="roomList"></div>
<button onclick="logout()">Logout</button>
</div>

<!-- CHAT -->
<div id="chat" style="display:none;">
<h3 id="roomTitle"></h3>

<div id="chatBox" class="chat-box"></div>

<div class="input-area">
<input id="msg" placeholder="Ketik...">
<button onclick="sendMsg()">➤</button>
</div>

<button onclick="back()">Back</button>
</div>

</div>

<!-- SETTINGS PANEL -->
<div id="settings">
  <div class="settings-box">
    <h3>Settings</h3>

    Nama:
    <input id="setName">

    <br><br>

    <label>
      <input type="checkbox" id="privacy">
      Privacy Read (jangan kasih centang biru)
    </label>

    <br><br>

    <button onclick="toggleMode()">Toggle Dark/Light</button>

    <br><br>

    <button onclick="saveSettings()">Save</button>
    <button onclick="closeSettings()">Close</button>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAnDdfNeNhS5oYYYNkESOZHCYbwe3boY2Q",
  authDomain: "morse-f36e5.firebaseapp.com",
  databaseURL: "https://morse-f36e5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "morse-f36e5",
  storageBucket: "morse-f36e5.firebasestorage.app",
  messagingSenderId: "41752377914",
  appId: "1:41752377914:web:881b1c19c011d6fea0d303",
  measurementId: "G-RLTTLG36SS"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username="";
let currentRoom="";
let privacy=false;

/* LOAD SETTINGS */
window.onload=function(){
 username = localStorage.getItem("name") || "";
 privacy = localStorage.getItem("privacy")==="true";

 document.body.className = localStorage.getItem("theme") || "";

 if(username){
   showLobby();
 }
};

/* LOGIN */
function saveName(){
 let n=document.getElementById("name").value;
 if(!n)return;
 username=n;
 localStorage.setItem("name",n);
 showLobby();
}

/* LOBBY */
function showLobby(){
 document.getElementById("login").style.display="none";
 document.getElementById("lobby").style.display="block";
 document.getElementById("username").innerText=username;
}

/* ROOM */
function joinRoom(){
 currentRoom=document.getElementById("roomInput").value;
 document.getElementById("lobby").style.display="none";
 document.getElementById("chat").style.display="block";
 document.getElementById("roomTitle").innerText=currentRoom;
 loadMessages();
}

/* SEND */
function sendMsg(){
 let msg=document.getElementById("msg").value;
 if(!msg)return;

 db.ref("rooms/"+currentRoom).push({
   name:username,
   msg:msg,
   time:Date.now(),
   read:false
 });

 document.getElementById("msg").value="";
}

/* LOAD */
function loadMessages(){
 let box=document.getElementById("chatBox");
 box.innerHTML="";
 db.ref("rooms/"+currentRoom).off();

 db.ref("rooms/"+currentRoom).on("child_added",snap=>{
   let key=snap.key;
   let d=snap.val();

   if(!privacy && d.name !== username){
     db.ref("rooms/"+currentRoom+"/"+key+"/read").set(true);
   }

   let div=document.createElement("div");
   div.className="bubble "+(d.name===username?"me":"other");

   let time=new Date(d.time).toLocaleTimeString().slice(0,5);
   let tickColor = d.read ? "#00aaff" : "#888";

   div.innerHTML =
   "<b>"+d.name+"</b><br>"+d.msg+
   "<div class='meta'>"+time+" <span style='color:"+tickColor+"'>✔</span></div>";

   box.appendChild(div);
   box.scrollTop=box.scrollHeight;

   // 🔔 NOTIF SAAT WEB TERBUKA
   if(d.name !== username){
     if(Notification.permission==="granted"){
       new Notification(d.name+": "+d.msg);
     }
   }
 });
}

/* SETTINGS */
function openSettings(){
 document.getElementById("settings").style.display="block";
 document.getElementById("setName").value=username;
 document.getElementById("privacy").checked=privacy;
}
function closeSettings(){
 document.getElementById("settings").style.display="none";
}
function saveSettings(){
 username=document.getElementById("setName").value;
 privacy=document.getElementById("privacy").checked;

 localStorage.setItem("name",username);
 localStorage.setItem("privacy",privacy);

 closeSettings();
 alert("saved!");
}

/* MODE */
function toggleMode(){
 let mode = document.body.className==="dark"?"":"dark";
 document.body.className=mode;
 localStorage.setItem("theme",mode);
}

/* NOTIFICATION PERMISSION */
if("Notification" in window){
 Notification.requestPermission();
}

/* BACK */
function back(){
 document.getElementById("chat").style.display="none";
 document.getElementById("lobby").style.display="block";
}

/* LOGOUT */
function logout(){
 localStorage.clear();
 location.reload();
}
</script>

</body>
</html>
