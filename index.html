<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenChat</title>

<style>
body {
  margin:0;
  font-family:Arial;
  display:flex;
  justify-content:center;
}

body.dark { background:#0a0a0a; color:#00ff88; }
body.light { background:#fff; color:#008000; }

.container {
  width:100%;
  max-width:420px;
  padding:15px;
}

input, button {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

body.dark input { background:#111; color:#0f0; }
body.light input { background:#eee; }

button { background:#00aa55; color:black; }

/* CHAT */
.chat-box {
  height:300px;
  overflow-y:auto;
  padding:10px;
  border-radius:10px;
  display:flex;
  flex-direction:column;
}

body.dark .chat-box { background:#111; }
body.light .chat-box { background:#eee; }

.bubble {
  max-width:75%;
  padding:8px;
  margin:4px 0;
  border-radius:10px;
}

.me { align-self:flex-end; background:#00aa55; color:white; }
.other { align-self:flex-start; background:#222; color:#0f0; }

.meta { font-size:10px; opacity:0.7; text-align:right; }

.room {
  padding:6px;
  border-bottom:1px solid #888;
  cursor:pointer;
}
</style>
</head>

<body class="dark">

<div class="container">

<h2>GreenChat</h2>
<button onclick="toggleMode()">Toggle Mode</button>

<div id="login">
<input id="name" placeholder="Nama...">
<button onclick="saveName()">Masuk</button>
</div>

<div id="lobby" style="display:none;">
<h3>Halo, <span id="username"></span></h3>

<input id="roomInput" placeholder="Room">
<button onclick="joinRoom()">Join</button>

<div id="roomList"></div>

<button onclick="logout()">Logout</button>
</div>

<div id="chat" style="display:none;">
<h3 id="roomTitle"></h3>

<div id="chatBox" class="chat-box"></div>

<input id="msg" placeholder="Ketik...">
<button onclick="sendMsg()">Kirim</button>
<button onclick="back()">Back</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAnDdfNeNhS5oYYYNkESOZHCYbwe3boY2Q",
  authDomain: "morse-f36e5.firebaseapp.com",
  databaseURL: "https://morse-f36e5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "morse-f36e5",
  storageBucket: "morse-f36e5.firebasestorage.app",
  messagingSenderId: "41752377914",
  appId: "1:41752377914:web:881b1c19c011d6fea0d303",
  measurementId: "G-RLTTLG36SS"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let username="";
let currentRoom="";

// LOGIN
function saveName(){
 let n=document.getElementById("name").value.trim();
 if(!n){
   alert("isi nama dulu");
   return;
 }
 localStorage.setItem("name",n);
 location.reload();
}

// AUTO LOGIN (FIX)
window.onload=function(){
 let saved=localStorage.getItem("name");
 if(saved){
   username=saved;
   showLobby();
 }
};

// LOBBY
function showLobby(){
 document.getElementById("login").style.display="none";
 document.getElementById("lobby").style.display="block";
 document.getElementById("username").innerText=username;
 loadRooms();
}

// LOGOUT
function logout(){
 localStorage.removeItem("name");
 location.reload();
}

// ROOM
function joinRoom(){
 let room=document.getElementById("roomInput").value;
 if(!room)return;

 currentRoom=room;

 let rooms=JSON.parse(localStorage.getItem("rooms")||"[]");
 if(!rooms.includes(room)){
   rooms.push(room);
   localStorage.setItem("rooms",JSON.stringify(rooms));
 }

 document.getElementById("lobby").style.display="none";
 document.getElementById("chat").style.display="block";
 document.getElementById("roomTitle").innerText=room;

 loadMessages();
}

function loadRooms(){
 let list=document.getElementById("roomList");
 list.innerHTML="";

 let rooms=JSON.parse(localStorage.getItem("rooms")||"[]");

 rooms.forEach(r=>{
   let div=document.createElement("div");
   div.className="room";
   div.innerText=r;
   div.onclick=()=>{
     document.getElementById("roomInput").value=r;
     joinRoom();
   };
   list.appendChild(div);
 });
}

// CHAT
function sendMsg(){
 let msg=document.getElementById("msg").value;
 if(!msg)return;

 if(msg==="/clear"){
   db.ref("rooms/"+currentRoom).remove();
   return;
 }

 db.ref("rooms/"+currentRoom).push({
   name:username,
   msg:msg,
   time:Date.now()
 });

 document.getElementById("msg").value="";
}

function loadMessages(){
 let box=document.getElementById("chatBox");
 box.innerHTML="";

 db.ref("rooms/"+currentRoom).off();

 db.ref("rooms/"+currentRoom).on("child_added",snap=>{
   let d=snap.val();
   if(!d.msg)return;

   let div=document.createElement("div");
   div.className="bubble "+(d.name===username?"me":"other");

   let t=new Date(d.time);
   let time=t.getHours()+":"+String(t.getMinutes()).padStart(2,"0");

   div.innerHTML="<b>"+d.name+"</b><br>"+d.msg+"<div class='meta'>"+time+"</div>";

   box.appendChild(div);
   box.scrollTop=box.scrollHeight;
 });
}

// BACK
function back(){
 document.getElementById("chat").style.display="none";
 document.getElementById("lobby").style.display="block";
}

// MODE
function toggleMode(){
 document.body.classList.toggle("light");
 document.body.classList.toggle("dark");
}
</script>

</body>
</html>
