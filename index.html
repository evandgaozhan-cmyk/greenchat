<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GreenChat</title>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  justify-content:center;
  background:#e5ddd5;
}

.container{
  width:100%;
  max-width:420px;
  padding:10px;
}

input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}

/* CHAT */
.chat-box{
  height:300px;
  overflow-y:auto;
  padding:10px;
  border-radius:10px;
  background:#fff;
  display:flex;
  flex-direction:column;
}

.bubble{
  max-width:75%;
  padding:8px;
  margin:4px 0;
  border-radius:10px;
}

.me{align-self:flex-end;background:#dcf8c6;}
.other{align-self:flex-start;background:#eee;}

.meta{
  font-size:10px;
  opacity:0.6;
  text-align:right;
}

/* ROOM */
.room,.user{
  padding:8px;
  border-bottom:1px solid #ccc;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>GreenChat</h2>

<!-- LOGIN -->
<div id="login">
<input id="name" placeholder="Nama">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Masuk</button>
</div>

<!-- LOBBY -->
<div id="lobby" style="display:none">

<h3>Halo, <span id="username"></span></h3>

<input id="roomInput" placeholder="Room">
<button onclick="joinRoom()">Join</button>
<button onclick="makeRoom()">Make</button>

<h4>Rooms</h4>
<div id="roomList"></div>

<h4>DM</h4>
<input id="search" placeholder="Cari user..." oninput="searchUser()">
<div id="userList"></div>

<button onclick="logout()">Logout</button>

</div>

<!-- CHAT -->
<div id="chat" style="display:none">

<h3 id="roomTitle"></h3>

<div id="chatBox" class="chat-box"></div>

<input id="msg" placeholder="Ketik...">
<button onclick="sendMsg()">Kirim</button>
<button onclick="back()">Back</button>

</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAnDdfNeNhS5oYYYNkESOZHCYbwe3boY2Q",
  authDomain: "morse-f36e5.firebaseapp.com",
  databaseURL: "https://morse-f36e5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "morse-f36e5",
  storageBucket: "morse-f36e5.firebasestorage.app",
  messagingSenderId: "41752377914",
  appId: "1:41752377914:web:881b1c19c011d6fea0d303",
  measurementId: "G-RLTTLG36SS"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let username="";
let currentTarget="";
let mode="group";

/* LOGIN */
function login(){
 let n=name.value.trim();
 let p=pass.value.trim();
 if(!n||!p)return alert("isi semua");

 db.ref("users/"+n).once("value",snap=>{
   if(!snap.exists()){
     db.ref("users/"+n).set({pass:p});
     enter(n,p);
   }else{
     if(snap.val().pass===p){
       enter(n,p);
     }else{
       alert("password salah");
     }
   }
 });
}

function enter(n,p){
 username=n;
 localStorage.setItem("user",n);
 localStorage.setItem("pass",p);

 loginDiv(false);
 loadRooms();
 loadUsers();
}

/* AUTO LOGIN */
window.onload=()=>{
 let u=localStorage.getItem("user");
 let p=localStorage.getItem("pass");
 if(u&&p){
   name.value=u;
   pass.value=p;
   login();
 }
};

function loginDiv(state){
 login.style.display=state?"block":"none";
 lobby.style.display=state?"none":"block";
 usernameSpan.innerText=username;
}

/* LOGOUT */
function logout(){
 localStorage.clear();
 location.reload();
}

/* ROOM */
function makeRoom(){
 let r=roomInput.value;
 if(!r)return;

 db.ref("rooms/"+r).set({created:true});
 saveRoomLocal(r);
 loadRooms();
}

function joinRoom(){
 let r=roomInput.value;
 if(!r)return;
 saveRoomLocal(r);
 openRoom(r);
}

/* SAVE ROOM (FITUR LAMA) */
function saveRoomLocal(r){
 let rooms=JSON.parse(localStorage.getItem("rooms")||"[]");
 if(!rooms.includes(r)){
   rooms.push(r);
   localStorage.setItem("rooms",JSON.stringify(rooms));
 }
}

/* LOAD ROOMS */
function loadRooms(){
 roomList.innerHTML="";
 let rooms=JSON.parse(localStorage.getItem("rooms")||"[]");

 rooms.forEach(r=>{
   let div=document.createElement("div");
   div.className="room";
   div.innerText=r;
   div.onclick=()=>openRoom(r);
   roomList.appendChild(div);
 });
}

/* USERS (DM) */
function loadUsers(){
 userList.innerHTML="";

 db.ref("users").once("value",snap=>{
   let data=snap.val()||{};
   Object.keys(data).forEach(u=>{
     if(u===username)return;

     let div=document.createElement("div");
     div.className="user";
     div.innerText=u;
     div.onclick=()=>openDM(u);
     userList.appendChild(div);
   });
 });
}

function searchUser(){
 let q=search.value.toLowerCase();
 document.querySelectorAll(".user").forEach(u=>{
   u.style.display=u.innerText.toLowerCase().includes(q)?"block":"none";
 });
}

/* OPEN */
function openRoom(r){
 mode="group";
 currentTarget=r;
 showChat(r);
}

function openDM(u){
 mode="dm";
 currentTarget=u;
 showChat("DM "+u);
}

/* CHAT */
function showChat(title){
 lobby.style.display="none";
 chat.style.display="block";
 roomTitle.innerText=title;
 loadMessages();
}

function back(){
 chat.style.display="none";
 lobby.style.display="block";
}

/* SEND */
function sendMsg(){
 let m=msg.value;
 if(!m)return;

 let path = mode==="group"
 ? "rooms/"+currentTarget+"/msg"
 : "dm/"+[username,currentTarget].sort().join("_");

 db.ref(path).push({
   name:username,
   msg:m,
   time:Date.now()
 });

 msg.value="";
}

/* LOAD MESSAGE */
function loadMessages(){
 chatBox.innerHTML="";

 let path = mode==="group"
 ? "rooms/"+currentTarget+"/msg"
 : "dm/"+[username,currentTarget].sort().join("_");

 db.ref(path).off();

 db.ref(path).on("child_added",snap=>{
   let d=snap.val();

   let div=document.createElement("div");
   div.className="bubble "+(d.name===username?"me":"other");

   let t=new Date(d.time);
   let time=t.getHours()+":"+String(t.getMinutes()).padStart(2,"0");

   div.innerHTML="<b>"+d.name+"</b><br>"+d.msg+"<div class='meta'>"+time+"</div>";

   chatBox.appendChild(div);
   chatBox.scrollTop=chatBox.scrollHeight;
 });
}
</script>

</body>
</html>
