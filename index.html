<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GreenChat</title>

<style>
body { margin:0; font-family:Arial; }
body.dark { background:#0a0a0a; color:#00ff88; }
body.light { background:#fff; color:#008000; }

.container { display:flex; height:100vh; }

/* LEFT */
.left {
  width:65%;
  padding:10px;
}

/* RIGHT (DM LIST) */
.right {
  width:35%;
  border-left:1px solid #888;
  padding:10px;
  overflow-y:auto;
}

.user {
  padding:5px;
  cursor:pointer;
  border-bottom:1px solid #666;
}

/* CHAT */
.chat-box {
  height:250px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}

.bubble {
  max-width:75%;
  padding:6px;
  margin:4px;
  border-radius:10px;
  font-size:13px;
}

.me { align-self:flex-end; background:#00aa55; color:white; }
.other { align-self:flex-start; background:#111; color:#0f0; }

.meta { font-size:10px; opacity:0.7; }

/* typing */
.typing { font-size:12px; }

.online { color:#00ff88; }
.offline { color:gray; }
</style>
</head>

<body class="dark">

<div class="container">

<div class="left">

<div id="login">
<input id="name" placeholder="nama">
<button onclick="saveName()">masuk</button>
</div>

<div id="app" style="display:none;">

<h3 id="chatTitle">Group</h3>

<div id="chatBox" class="chat-box"></div>
<div id="typing" class="typing"></div>

<input id="msg" oninput="typing()" placeholder="ketik...">
<button onclick="sendMsg()">kirim</button>

</div>
</div>

<div class="right">
<h3>DM</h3>
<div id="userList"></div>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAnDdfNeNhS5oYYYNkESOZHCYbwe3boY2Q",
  authDomain: "morse-f36e5.firebaseapp.com",
  databaseURL: "https://morse-f36e5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "morse-f36e5",
  storageBucket: "morse-f36e5.firebasestorage.app",
  messagingSenderId: "41752377914",
  appId: "1:41752377914:web:881b1c19c011d6fea0d303",
  measurementId: "G-RLTTLG36SS"
};
firebase.initializeApp(config);
const db=firebase.database();

let username=localStorage.getItem("name");
let currentChat="group";
let typingTimeout;

// LOGIN
function saveName(){
 let n=document.getElementById("name").value;
 if(!n)return;
 localStorage.setItem("name",n);
 username=n;
 startApp();
}

function startApp(){
 document.getElementById("login").style.display="none";
 document.getElementById("app").style.display="block";

 setOnline();
 loadUsers();
 loadMessages();
}

// ONLINE STATUS
function setOnline(){
 db.ref("status/"+username).set({online:true,last:Date.now()});
 window.addEventListener("beforeunload",()=>{
  db.ref("status/"+username).set({online:false,last:Date.now()});
 });
}

// LOAD USERS
function loadUsers(){
 db.ref("status").on("value",snap=>{
  let list=document.getElementById("userList");
  list.innerHTML="";
  let data=snap.val()||{};
  Object.keys(data).forEach(u=>{
    if(u===username)return;

    let div=document.createElement("div");
    div.className="user";

    let s=data[u];
    let status=s.online
      ? '<span class="online">online</span>'
      : 'last seen '+new Date(s.last).toLocaleTimeString();

    div.innerHTML=u+"<br>"+status;
    div.onclick=()=>openDM(u);

    list.appendChild(div);
  });
 });
}

// OPEN DM
function openDM(user){
 currentChat="dm_"+[username,user].sort().join("_");
 document.getElementById("chatTitle").innerText="DM: "+user;
 loadMessages();
}

// SEND
function sendMsg(){
 let msg=document.getElementById("msg").value;
 if(!msg)return;

 db.ref("chats/"+currentChat).push({
  name:username,
  msg:msg,
  time:Date.now()
 });

 document.getElementById("msg").value="";
}

// LOAD CHAT
function loadMessages(){
 let box=document.getElementById("chatBox");
 box.innerHTML="";

 db.ref("chats/"+currentChat).off();

 db.ref("chats/"+currentChat).on("child_added",snap=>{
  let d=snap.val();

  let div=document.createElement("div");
  div.className="bubble "+(d.name===username?"me":"other");

  let t=new Date(d.time);
  let time=t.getHours()+":"+String(t.getMinutes()).padStart(2,"0");

  div.innerHTML=d.name+": "+d.msg+
    "<div class='meta'>"+time+"</div>";

  box.appendChild(div);
  box.scrollTop=box.scrollHeight;

  if(document.hidden && d.name!==username){
    new Notification(d.name,{body:d.msg});
  }
 });
}

// TYPING
function typing(){
 db.ref("typing/"+currentChat+"/"+username).set(true);
 clearTimeout(typingTimeout);
 typingTimeout=setTimeout(()=>{
  db.ref("typing/"+currentChat+"/"+username).set(false);
 },1500);
}

// AUTO LOGIN
if(username) startApp();
</script>

</body>
</html>
