<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GreenChat Classic</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: #00ff88;
}

.container { padding: 20px; }

input, button {
  padding: 10px;
  margin: 5px 0;
  border: none;
  border-radius: 5px;
}

input {
  width: 100%;
  background: #111;
  color: #0f0;
}

button {
  background: #00aa55;
  color: black;
  cursor: pointer;
}

button:hover {
  background: #00ff88;
}

.chat-box {
  height: 300px;
  overflow-y: auto;
  background: #111;
  padding: 10px;
  margin: 10px 0;
}

.msg { margin: 5px 0; }

.room {
  cursor: pointer;
  padding: 5px;
  border-bottom: 1px solid #333;
}
</style>
</head>

<body>

<div class="container">

<h2>GreenChat Classic</h2>

<div id="login">
  <input id="name" placeholder="Masukkan nama...">
  <button onclick="saveName()">Masuk</button>
</div>

<div id="lobby" style="display:none;">
  <h3>Halo, <span id="username"></span></h3>

  <input id="roomInput" placeholder="Nama room">
  <button onclick="createRoom()">Buat / Join Room</button>

  <h4>Room kamu:</h4>
  <div id="roomList"></div>
</div>

<div id="chat" style="display:none;">
  <h3 id="roomTitle"></h3>

  <div class="chat-box" id="chatBox"></div>

  <input id="msg" placeholder="Ketik pesan...">
  <button onclick="sendMsg()">Kirim</button>
  <button onclick="back()">Kembali</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "********",
  authDomain: "morse-f36e5.firebaseapp.com",
  databaseURL: "https://morse-f36e5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "morse-f36e5",
  storageBucket: "morse-f36e5.appspot.com",
  messagingSenderId: "********",
  appId: "********"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = localStorage.getItem("name");
let currentRoom = "";

// ================= ADMIN =================
function isAdmin(user) {
  return user === "evand";
}

// ================= USER =================
function saveName() {
  const name = document.getElementById("name").value;
  if (!name) return;

  localStorage.setItem("name", name);
  username = name;
  showLobby();
}

function showLobby() {
  document.getElementById("login").style.display = "none";
  document.getElementById("lobby").style.display = "block";
  document.getElementById("username").innerText = username;
  loadRooms();
}

function createRoom() {
  const room = document.getElementById("roomInput").value;
  if (!room) return;
  joinRoom(room);
}

function joinRoom(room) {
  currentRoom = room;

  let rooms = JSON.parse(localStorage.getItem("rooms") || "[]");
  if (!rooms.includes(room)) {
    rooms.push(room);
    localStorage.setItem("rooms", JSON.stringify(rooms));
  }

  document.getElementById("lobby").style.display = "none";
  document.getElementById("chat").style.display = "block";
  document.getElementById("roomTitle").innerText = room;

  loadMessages();
}

function loadRooms() {
  const list = document.getElementById("roomList");
  list.innerHTML = "";

  let rooms = JSON.parse(localStorage.getItem("rooms") || "[]");

  rooms.forEach(r => {
    let div = document.createElement("div");
    div.className = "room";
    div.innerText = r;
    div.onclick = () => joinRoom(r);
    list.appendChild(div);
  });
}

// ================= CHAT =================
function sendMsg() {
  const msg = document.getElementById("msg").value;
  if (!msg) return;

  handleCommand(msg);

  db.ref("rooms/" + currentRoom).push({
    name: username,
    msg: msg
  });

  document.getElementById("msg").value = "";
}

// ================= COMMAND =================
function handleCommand(msg) {
  let parts = msg.trim().split(" ");
  let cmd = parts[0].toLowerCase();

  // /kick
  if (cmd === "/kick") {
    if (!isAdmin(username)) return alert("bukan admin");

    let target = parts[1];
    let time = parseInt(parts[2]) || 60;

    if (!target) return;

    db.ref("rooms/" + currentRoom + "/banned/" + target)
      .set(Date.now() + time * 1000);

    alert(`${target} di-kick ${time} detik`);
    return;
  }

  // /add admin
  if (cmd === "/add") {
    if (!isAdmin(username)) return alert("bukan admin");

    let target = parts[1];
    if (!target) return;

    db.ref("rooms/" + currentRoom + "/admins/" + target)
      .set(true);

    alert(`${target} jadi admin`);
    return;
  }

  // /clear
  if (cmd === "/clear") {
    if (!isAdmin(username)) return alert("bukan admin");

    db.ref("rooms/" + currentRoom).remove();
    alert("chat dibersihkan");
    return;
  }
}

// ================= LOAD CHAT =================
function loadMessages() {
  const chatBox = document.getElementById("chatBox");
  chatBox.innerHTML = "";

  db.ref("rooms/" + currentRoom).off();

  db.ref("rooms/" + currentRoom).on("child_added", data => {
    let d = data.val();
    if (!d.msg) return;

    let div = document.createElement("div");
    div.className = "msg";
    div.innerText = d.name + ": " + d.msg;

    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

// ================= BACK =================
function back() {
  document.getElementById("chat").style.display = "none";
  document.getElementById("lobby").style.display = "block";
}

// auto login
if (username) showLobby();

</script>

</body>
</html>
