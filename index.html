<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GreenChat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0a;
      color: #00ff88;
    }
    .container { padding: 20px; }
    input, button {
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 5px;
    }
    input { width: 100%; background: #111; color: #0f0; }
    button { background: #00aa55; color: black; cursor: pointer; }
    button:hover { background: #00ff88; }
    .chat-box {
      height: 300px;
      overflow-y: auto;
      background: #111;
      padding: 10px;
      margin: 10px 0;
    }
    .msg { margin: 5px 0; }
    .room { cursor: pointer; padding: 5px; border-bottom: 1px solid #333; }
  </style>
</head>

<body>
<div class="container">

<h2>GreenChat</h2>

<div id="login">
  <input id="name" placeholder="Masukkan nama...">
  <button onclick="saveName()">Masuk</button>
</div>

<div id="lobby" style="display:none;">
  <h3>Halo, <span id="username"></span></h3>

  <input id="roomInput" placeholder="Nama room">
  <button onclick="createRoom()">Buat / Join Room</button>

  <h4>Room kamu:</h4>
  <div id="roomList"></div>
</div>

<div id="chat" style="display:none;">
  <h3 id="roomTitle"></h3>
  <div class="chat-box" id="chatBox"></div>
  <input id="msg" placeholder="Ketik pesan...">
  <button onclick="sendMsg()">Kirim</button>
  <button onclick="back()">Kembali</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAnDdfNeNhS5oYYYNkESOZHCYbwe3boY2Q",
  authDomain: "morse-f36e5.firebaseapp.com",
  databaseURL: "https://morse-f36e5-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "morse-f36e5",
  storageBucket: "morse-f36e5.firebasestorage.app",
  messagingSenderId: "41752377914",
  appId: "1:41752377914:web:881b1c19c011d6fea0d303",
  measurementId: "G-RLTTLG36SS"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let username = localStorage.getItem("name");
let currentRoom = "";

// ================== ADMIN SYSTEM ==================
function isAdmin(room, user) {
  return user === "evand";
}

// ================== BOT ==================
function bot(room, msg) {
  msg = msg.toLowerCase();

  // MENU BOT
  if (msg === "/bot") {
    sendBot(room,
`oh, hi ${username}

1. info grup
2. kick (admin)
3. add admin (admin)
4. ngobrol sama aku`);
    return;
  }

  // INFO GRUP
  if (msg === "1" || msg.includes("info")) {
    db.ref("rooms/" + room + "/meta").once("value", snap => {
      let m = snap.val() || {};
      sendBot(room,
`📊 INFO GRUP
Nama: ${room}
Pesan: ${m.messages || 0}
User join: ${m.joins || 0}`);
    });
    return;
  }

  // KICK SYSTEM
  if (msg.startsWith("2") || msg.includes("kick")) {
    if (!isAdmin(room, username)) {
      sendBot(room, "❌ hanya admin yang bisa kick");
      return;
    }

    let parts = msg.split(" ");
    let target = parts[1];
    let time = parseInt(parts[2]) || 60; // detik

    db.ref("rooms/" + room + "/banned/" + target).set(Date.now() + time*1000);

    sendBot(room, `👢 ${target} di-kick selama ${time} detik`);
    return;
  }

  // ADD ADMIN
  if (msg.includes("add admin")) {
    if (!isAdmin(room, username)) {
      sendBot(room, "❌ bukan admin");
      return;
    }

    let target = msg.split(" ").pop();

    db.ref("rooms/" + room + "/admins/" + target).set(true);
    sendBot(room, `⭐ ${target} sekarang admin`);
    return;
  }

  // CHAT AI
  const replies = [
    "menarik 🤔",
    "lanjutkan",
    "aku dengar kamu",
    "cerita lagi"
  ];

  sendBot(room, replies[Math.floor(Math.random()*replies.length)]);
}

function sendBot(room, text) {
  db.ref("rooms/" + room).push({
    name: "mygreen",
    msg: text
  });
}

// ================== USER SYSTEM ==================
function saveName() {
  const name = document.getElementById("name").value;
  if (!name) return;
  localStorage.setItem("name", name);
  username = name;
  showLobby();
}

function showLobby() {
  document.getElementById("login").style.display = "none";
  document.getElementById("lobby").style.display = "block";
  document.getElementById("username").innerText = username;
  loadRooms();
}

function createRoom() {
  const room = document.getElementById("roomInput").value;
  if (!room) return;
  joinRoom(room);
}

function joinRoom(room) {
  currentRoom = room;

  let rooms = JSON.parse(localStorage.getItem("rooms") || "[]");
  if (!rooms.includes(room)) {
    rooms.push(room);
    localStorage.setItem("rooms", JSON.stringify(rooms));
  }

  // track join
  db.ref("rooms/" + room + "/meta/joins").transaction(v => (v||0)+1);

  document.getElementById("lobby").style.display = "none";
  document.getElementById("chat").style.display = "block";
  document.getElementById("roomTitle").innerText = room;

  loadMessages();
}

function loadRooms() {
  const list = document.getElementById("roomList");
  list.innerHTML = "";

  let rooms = JSON.parse(localStorage.getItem("rooms") || "[]");

  rooms.forEach(r => {
    let div = document.createElement("div");
    div.className = "room";
    div.innerText = r;
    div.onclick = () => joinRoom(r);
    list.appendChild(div);
  });
}

// ================== CHAT ==================
function sendMsg() {
  const msg = document.getElementById("msg").value;
  if (!msg) return;

  // CHECK BAN
  db.ref("rooms/" + currentRoom + "/banned/" + username).once("value", snap => {
    let ban = snap.val();
    if (ban && ban > Date.now()) {
      alert("kamu di-kick sementara");
      return;
    }

    db.ref("rooms/" + currentRoom).push({
      name: username,
      msg: msg
    });

    db.ref("rooms/" + currentRoom + "/meta/messages").transaction(v => (v||0)+1);

    document.getElementById("msg").value = "";

    // BOT TRIGGER
    setTimeout(() => bot(currentRoom, msg), 400);
  });
}

function loadMessages() {
  const chatBox = document.getElementById("chatBox");
  chatBox.innerHTML = "";

  db.ref("rooms/" + currentRoom).off();

  db.ref("rooms/" + currentRoom).on("child_added", data => {
    let d = data.val();
    if (!d.msg) return;

    let div = document.createElement("div");
    div.className = "msg";
    div.innerText = d.name + ": " + d.msg;
    chatBox.appendChild(div);

    chatBox.scrollTop = chatBox.scrollHeight;
  });
}

function back() {
  document.getElementById("chat").style.display = "none";
  document.getElementById("lobby").style.display = "block";
}

if (username) showLobby();
</script>

</body>
</html>
